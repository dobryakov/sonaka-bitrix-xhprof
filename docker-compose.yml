services:
  # Файлы сайта + PHP/Apache
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bitrix-web
    ports:
      - "${WEB_PORT:-8282}:80"
    volumes:
      # Корень сайта (bitrix/, upload/, local/ и т.д.)
      - ./www:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    # В `/bitrix/php_interface/dbconn.php`: сервер `db`, пользователь/БД из переменных MYSQL_*
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # База данных (MySQL-совместимая; для Битрикс обычно MariaDB или MySQL 8)
  db:
    image: mariadb:10.11
    container_name: bitrix-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootsecret}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-bitrix}"
      MYSQL_USER: "${MYSQL_USER:-bitrix}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-bitrixsecret}"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb_file_per_table=1
      --sql-mode=""
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - bitrix_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  bitrix_db_data:
